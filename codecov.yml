# https://docs.codecov.com/docs/codecovyml-reference#coverage
coverage:
  status:
    project: true
    patch: true

https://docs.codecov.com/docs/codecovyml-reference#comment
comment:
  layout: "header, diff, flags, components"

# https://docs.codecov.com/docs/codecovyml-reference#component_management
component_management:
  default_rules:
    statuses:
      # every component will produce its own status check that requires coverage increase
      - type: project
        target: auto
  individual_components:
    - component_id: package_aws_cdk  # identifier that should not be changed
      name: packages/aws-cdk # display name that can change freely
      paths:
        - packages/aws-cdk/**
